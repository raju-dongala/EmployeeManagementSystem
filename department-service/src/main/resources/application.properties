spring.application.name=department-service

server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/department_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.com.department=DEBUG

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Expose actuator endpoints
management.endpoints.web.exposure.include=*

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Enable health indicator
management.health.circuitbreakers.enabled=true

# Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.departmentService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.departmentService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.departmentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.departmentService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.departmentService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.departmentService.minimumNumberOfCalls=5